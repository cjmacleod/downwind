<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downwind</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #0A0A0A;
      --surface:    #141414;
      --card:       #1A1A1A;
      --red:        #E13B25;
      --red-dim:    rgba(225,59,37,0.15);
      --gray:       #939598;
      --border:     rgba(255,255,255,0.08);
      --white:      #FFFFFF;
      --text-muted: #7A7A7A;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    /* ГўВ”ВЂГўВ”ВЂ Header ГўВ”ВЂГўВ”ВЂ */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--white);
      text-transform: uppercase;
    }

    .logo span {
      color: var(--red);
    }

    .season-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ГўВ”ВЂГўВ”ВЂ Controls ГўВ”ВЂГўВ”ВЂ */
    .controls {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cat-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .cat-btn:hover {
      border-color: var(--red);
      color: var(--white);
    }

    .cat-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: var(--white);
    }

    .generate-btn {
      margin-left: auto;
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 9px 22px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.15s ease;
    }

    .generate-btn:hover { opacity: 0.85; }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ГўВ”ВЂГўВ”ВЂ Grid ГўВ”ВЂГўВ”ВЂ */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 20px 24px 40px;
      align-items: stretch;
    }

    @media (max-width: 900px) {
      .cards-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; align-items: flex-start; }
      .generate-btn { margin-left: 0; width: 100%; }
    }

    /* ГўВ”ВЂГўВ”ВЂ Card ГўВ”ВЂГўВ”ВЂ */
    .race-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s ease;
    }

    .race-card:hover { border-color: rgba(225,59,37,0.35); }

    .card-inner {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ГўВ”ВЂГўВ”ВЂ Card header ГўВ”ВЂГўВ”ВЂ */
    .race-meta {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: flex-start;
      gap: 8px;
      padding: 14px 16px 0;
    }

    .race-event {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .status-badge {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-live {
      background: var(--red);
      color: var(--white);
    }

    .badge-recent {
      background: rgba(147,149,152,0.2);
      color: var(--gray);
    }

    .badge-next {
      background: rgba(225,59,37,0.15);
      color: var(--red);
    }

    /* ГўВ”ВЂГўВ”ВЂ Team names ГўВ”ВЂГўВ”ВЂ */
    .teams {
      padding: 10px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .team-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .team-pos {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .vs-divider {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--border);
      padding: 0 4px;
    }

    /* ГўВ”ВЂГўВ”ВЂ Divider ГўВ”ВЂГўВ”ВЂ */
    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0 16px;
    }

    /* ГўВ”ВЂГўВ”ВЂ Body ГўВ”ВЂГўВ”ВЂ */
    .card-body {
      padding: 14px 16px 16px;
      flex: 1;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .card-text {
      font-size: 13px;
      line-height: 1.65;
      color: var(--gray);
    }

    /* ГўВ”ВЂГўВ”ВЂ Expand toggle ГўВ”ВЂГўВ”ВЂ */
    .expand-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--red);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      margin-top: 8px;
    }

    .expand-toggle.visible { display: inline-block; }

    /* ГўВ”ВЂГўВ”ВЂ Skeleton / loading ГўВ”ВЂГўВ”ВЂ */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, rgba(60,60,60,0.4) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .sk-line { height: 13px; margin-bottom: 8px; }
    .sk-title { height: 16px; width: 70%; margin-bottom: 12px; }

    /* ГўВ”ВЂГўВ”ВЂ Empty state ГўВ”ВЂГўВ”ВЂ */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }

    .empty-state h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--white);
    }

    .empty-state p { font-size: 14px; }

    /* ГўВ”ВЂГўВ”ВЂ Error state ГўВ”ВЂГўВ”ВЂ */
    .error-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 24px;
      color: var(--red);
    }

    .error-state p { font-size: 14px; margin-top: 8px; color: var(--text-muted); }
  </style>
</head>
<body>

  <header>
    <div class="logo">Down<span>wind</span></div>
    <div class="season-badge">SailGP Г‚В· Season 6 Г‚В· 2026</div>
  </header>

  <div class="controls">
    <button class="cat-btn active" data-cat="championship">Championship</button>
    <button class="cat-btn" data-cat="form">Recent Form</button>
    <button class="cat-btn" data-cat="speed">Boat Speed</button>
    <button class="cat-btn" data-cat="preview">Next Event</button>
    <button class="generate-btn" id="generateBtn">Generate</button>
  </div>

  <div class="cards-grid" id="cardsGrid">
    <div class="empty-state">
      <h2>Select a category and generate</h2>
      <p>AI-powered SailGP race intelligence, grounded in live season data.</p>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
